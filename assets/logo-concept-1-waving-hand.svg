<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100">
  <!-- Logo Concept 1: Winkende Hand -->
  <defs>
    <style>
      .text-red { fill: #fa4f4f; }
      .text-gray { fill: #434343; }
    </style>
  </defs>
  
  <!-- Winkende Hand Icon -->
  <g transform="translate(10, 15)">
    <!-- Hand -->
    <path d="M35 45c-2-1-3-3-3-5v-20c0-2 2-4 4-4s4 2 4 4v14" fill="#fa4f4f"/>
    <path d="M40 34v-18c0-2 2-4 4-4s4 2 4 4v18" fill="#fa4f4f"/>
    <path d="M48 34v-14c0-2 2-4 4-4s4 2 4 4v14" fill="#fa4f4f"/>
    <path d="M56 38v-10c0-2 2-4 4-4s4 2 4 4v10" fill="#fa4f4f"/>
    <ellipse cx="48" cy="55" rx="18" ry="15" fill="#fa4f4f"/>
    <!-- Bewegungslinien -->
    <path d="M22 20 L16 15" stroke="#fa4f4f" stroke-width="2" stroke-linecap="round"/>
    <path d="M20 30 L12 28" stroke="#fa4f4f" stroke-width="2" stroke-linecap="round"/>
    <path d="M22 40 L14 42" stroke="#fa4f4f" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- Text: farewellify -->
  <text x="90" y="62" font-family="'Open Sans', Arial, sans-serif" font-size="32" font-weight="600">
    <tspan class="text-red">farewell</tspan><tspan class="text-gray">ify</tspan>
  </text>
</svg>
