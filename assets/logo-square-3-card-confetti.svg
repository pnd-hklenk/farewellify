<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Logo Square 3: Karte mit Konfetti -->
  
  <!-- Hintergrund -->
  <rect width="200" height="200" fill="white"/>
  
  <!-- Roter Kreis -->
  <circle cx="100" cy="85" r="60" fill="#fa4f4f"/>
  
  <!-- Karte (weiss) -->
  <g transform="translate(60, 45)">
    <!-- Karten-Schatten -->
    <rect x="8" y="12" width="40" height="50" rx="3" fill="white" opacity="0.3"/>
    <!-- Karte -->
    <rect x="12" y="8" width="40" height="50" rx="3" fill="white" transform="rotate(-8, 32, 33)"/>
    <!-- Herz auf Karte -->
    <path d="M30 28 C27 24 22 24 22 30 C22 35 30 42 30 42 C30 42 38 35 38 30 C38 24 33 24 30 28 Z" 
          fill="#fa4f4f" transform="rotate(-8, 32, 33)"/>
    
    <!-- Konfetti -->
    <circle cx="55" cy="5" r="4" fill="white"/>
    <circle cx="65" cy="15" r="3" fill="white" opacity="0.8"/>
    <circle cx="50" cy="-2" r="2.5" fill="white" opacity="0.6"/>
    <rect x="60" y="0" width="5" height="5" fill="white" opacity="0.7" transform="rotate(30, 62, 2)"/>
  </g>
  
  <!-- Text -->
  <text x="100" y="170" text-anchor="middle" font-family="'Open Sans', Arial, sans-serif" font-size="24" font-weight="600">
    <tspan fill="#fa4f4f">farewell</tspan><tspan fill="#434343">ify</tspan>
  </text>
</svg>
