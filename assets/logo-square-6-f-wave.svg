<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Logo Square 6: Minimalistisches F mit Welle -->
  
  <!-- Hintergrund -->
  <rect width="200" height="200" fill="white"/>
  
  <!-- Roter Kreis -->
  <circle cx="100" cy="85" r="60" fill="#fa4f4f"/>
  
  <!-- Grosses F -->
  <text x="85" y="110" font-family="'Open Sans', Arial, sans-serif" font-size="70" font-weight="700" fill="white">f</text>
  
  <!-- Winkende Welle -->
  <path d="M115 50 Q125 42 135 50 Q145 58 135 66" fill="none" stroke="white" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Text -->
  <text x="100" y="170" text-anchor="middle" font-family="'Open Sans', Arial, sans-serif" font-size="24" font-weight="600">
    <tspan fill="#fa4f4f">farewell</tspan><tspan fill="#434343">ify</tspan>
  </text>
</svg>
