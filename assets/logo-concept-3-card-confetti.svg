<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100">
  <!-- Logo Concept 3: Karte mit Konfetti -->
  <defs>
    <style>
      .text-red { fill: #fa4f4f; }
      .text-gray { fill: #434343; }
    </style>
  </defs>
  
  <!-- Ge�ffnete Karte -->
  <g transform="translate(10, 10)">
    <!-- Karten-R�ckseite -->
    <rect x="15" y="25" width="50" height="55" rx="3" fill="#434343" opacity="0.2"/>
    <!-- Karten-Vorderseite (leicht gekippt) -->
    <rect x="20" y="20" width="50" height="55" rx="3" fill="white" stroke="#fa4f4f" stroke-width="2" transform="rotate(-5, 45, 47)"/>
    <!-- Herz auf der Karte -->
    <path d="M42 40 C39 36 33 36 33 43 C33 48 42 55 42 55 C42 55 51 48 51 43 C51 36 45 36 42 40 Z" 
          fill="#fa4f4f" transform="rotate(-5, 45, 47)"/>
    
    <!-- Konfetti -->
    <circle cx="65" cy="15" r="4" fill="#fa4f4f"/>
    <circle cx="75" cy="25" r="3" fill="#fa4f4f" opacity="0.7"/>
    <circle cx="58" cy="8" r="2.5" fill="#fa4f4f" opacity="0.5"/>
    <rect x="70" y="10" width="6" height="6" fill="#fa4f4f" opacity="0.6" transform="rotate(30, 73, 13)"/>
    <rect x="62" cy="20" width="4" height="4" fill="#fa4f4f" opacity="0.8" transform="rotate(45, 64, 22)"/>
  </g>
  
  <!-- Text: farewellify -->
  <text x="95" y="62" font-family="'Open Sans', Arial, sans-serif" font-size="32" font-weight="600">
    <tspan class="text-red">farewell</tspan><tspan class="text-gray">ify</tspan>
  </text>
</svg>
