<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Pandata Farewellify</title>
    <link rel="icon" type="image/png" href="/assets/farewellify-logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        pandata: {
                            red: '#fa4f4f',
                            'red-dark': '#d14343',
                            'red-darker': '#a43535',
                            'coral': '#ff8888',
                            'gray-light': '#eeeeee',
                            'gray': '#999999',
                            'gray-dark': '#595959',
                            'charcoal': '#434343',
                        }
                    },
                    fontFamily: {
                        'sans': ['Open Sans', 'sans-serif'],
                        'mono': ['Courier New', 'monospace'],
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="min-h-screen bg-pandata-gray-light font-sans">
    <div class="container mx-auto px-4 py-8 max-w-4xl">
        <!-- Logo -->
        <div class="text-center mb-6">
            <img src="/assets/farewellify-logo.png" alt="Farewellify" class="h-24 mx-auto">
        </div>
        
        <!-- Header -->
        <div class="bg-pandata-charcoal rounded-lg p-6 mb-8 text-white shadow-lg border-l-4 border-pandata-red">
            <div class="flex items-center justify-between flex-wrap gap-4">
                <div>
                    <p class="text-pandata-gray text-sm mb-1 font-mono uppercase tracking-wider">Farewell Card for</p>
                    <h1 id="honoreeName" class="text-3xl font-semibold">Loading...</h1>
                </div>
                <div class="text-right">
                    <p class="text-pandata-gray text-sm mb-1 font-mono uppercase tracking-wider">Deadline</p>
                    <p id="deadline" class="text-xl font-semibold text-pandata-coral">Loading...</p>
                </div>
            </div>
        </div>

        <!-- Stats Cards -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-white rounded-lg p-5 shadow-md border-t-2 border-pandata-charcoal">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-pandata-gray text-xs font-mono uppercase">Total</p>
                        <p id="statTotal" class="text-2xl font-semibold text-pandata-charcoal">-</p>
                    </div>
                    <div class="w-10 h-10 bg-pandata-gray-light rounded-full flex items-center justify-center">
                        <i class="fas fa-users text-pandata-charcoal"></i>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-lg p-5 shadow-md border-t-2 border-green-500">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-pandata-gray text-xs font-mono uppercase">Submitted</p>
                        <p id="statSubmitted" class="text-2xl font-semibold text-green-600">-</p>
                    </div>
                    <div class="w-10 h-10 bg-green-100 rounded-full flex items-center justify-center">
                        <i class="fas fa-check text-green-600"></i>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-lg p-5 shadow-md border-t-2 border-yellow-500">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-pandata-gray text-xs font-mono uppercase">Invited</p>
                        <p id="statInvited" class="text-2xl font-semibold text-yellow-600">-</p>
                    </div>
                    <div class="w-10 h-10 bg-yellow-100 rounded-full flex items-center justify-center">
                        <i class="fas fa-envelope text-yellow-600"></i>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-lg p-5 shadow-md border-t-2 border-pandata-gray">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-pandata-gray text-xs font-mono uppercase">Not Invited</p>
                        <p id="statNotInvited" class="text-2xl font-semibold text-pandata-gray-dark">-</p>
                    </div>
                    <div class="w-10 h-10 bg-pandata-gray-light rounded-full flex items-center justify-center">
                        <i class="fas fa-user-clock text-pandata-gray"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
            <button onclick="sendInvitations()" id="sendInvitationsBtn"
                    class="py-3 px-4 bg-pandata-red text-white rounded-lg hover:bg-pandata-red-dark transition-colors shadow-md flex items-center justify-center text-sm font-medium">
                <i class="fas fa-envelope mr-2"></i>
                Send Invitations
            </button>
            <button onclick="sendReminders()" id="sendRemindersBtn"
                    class="py-3 px-4 bg-pandata-charcoal text-white rounded-lg hover:bg-black transition-colors shadow-md flex items-center justify-center text-sm font-medium">
                <i class="fas fa-bell mr-2"></i>
                Remind All Pending
            </button>
            <button onclick="openAddMemberModal()" id="addMemberBtn"
                    class="py-3 px-4 bg-pandata-gray-dark text-white rounded-lg hover:bg-pandata-charcoal transition-colors shadow-md flex items-center justify-center text-sm font-medium">
                <i class="fas fa-user-plus mr-2"></i>
                Add Member
            </button>
            <button onclick="downloadAll()" id="downloadAllBtn"
                    class="py-3 px-4 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors shadow-md flex items-center justify-center text-sm font-medium">
                <i class="fas fa-download mr-2"></i>
                Download ZIP
            </button>
        </div>

        <!-- Miro Collage Button -->
        <div id="miroSection" class="hidden mb-8">
            <div class="flex items-center gap-3">
                <button onclick="createMiroCollage()" id="createMiroBtn"
                        class="py-3 px-6 bg-[#FFD02F] text-pandata-charcoal rounded-lg hover:bg-[#f5c518] transition-colors shadow-md flex items-center justify-center text-sm font-semibold">
                    <svg class="w-5 h-5 mr-2" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M17.392 0H13.9L17 4.808 10.444 0H6.949l3.102 6.3L3.494 0H0l3.05 8.131L0 24h3.494l6.557-15.063L7.05 24h3.494L17 8.131 13.95 24h3.443l6.607-24h-3.557l-3.05 8.808L20.392 0h-3z"/>
                    </svg>
                    Create Miro Collage
                </button>
                <a id="miroLink" href="#" target="_blank" class="hidden py-3 px-4 bg-white border-2 border-[#FFD02F] text-pandata-charcoal rounded-lg hover:bg-[#FFD02F]/10 transition-colors shadow-md flex items-center justify-center text-sm font-medium">
                    <i class="fas fa-external-link-alt mr-2"></i>
                    Open in Miro
                </a>
            </div>
        </div>

        <!-- Add Member Modal -->
        <div id="addMemberModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
            <div class="bg-white rounded-lg shadow-xl w-full max-w-md mx-4">
                <div class="px-6 py-4 border-b border-pandata-gray-light">
                    <h3 class="text-lg font-semibold text-pandata-charcoal">
                        <i class="fas fa-user-plus mr-2 text-pandata-red"></i>
                        Add Team Member
                    </h3>
                </div>
                <div class="p-6">
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-pandata-charcoal mb-1">Email Address *</label>
                            <input type="email" id="newMemberEmail" placeholder="colleague@company.com"
                                   class="w-full px-4 py-2 border border-pandata-gray-light rounded-lg focus:ring-2 focus:ring-pandata-red focus:border-transparent">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-pandata-charcoal mb-1">Name (optional)</label>
                            <input type="text" id="newMemberName" placeholder="First Last"
                                   class="w-full px-4 py-2 border border-pandata-gray-light rounded-lg focus:ring-2 focus:ring-pandata-red focus:border-transparent">
                        </div>
                        <div class="flex items-center">
                            <input type="checkbox" id="sendInviteImmediately" checked
                                   class="w-4 h-4 text-pandata-red border-pandata-gray-light rounded focus:ring-pandata-red">
                            <label for="sendInviteImmediately" class="ml-2 text-sm text-pandata-gray-dark">
                                Send invitation email immediately
                            </label>
                        </div>
                    </div>
                </div>
                <div class="px-6 py-4 border-t border-pandata-gray-light flex justify-end gap-3">
                    <button onclick="closeAddMemberModal()"
                            class="px-4 py-2 text-pandata-gray-dark hover:text-pandata-charcoal transition-colors">
                        Cancel
                    </button>
                    <button onclick="addMember()" id="addMemberSubmitBtn"
                            class="px-4 py-2 bg-pandata-red text-white rounded-lg hover:bg-pandata-red-dark transition-colors">
                        Add Member
                    </button>
                </div>
            </div>
        </div>

        <!-- Notification -->
        <div id="notification" class="hidden fixed top-4 right-4 px-6 py-4 rounded-lg shadow-lg z-50"></div>

        <!-- Team Members Table -->
        <div class="bg-white rounded-lg shadow-md overflow-hidden">
            <div class="px-6 py-4 border-b border-pandata-gray-light bg-white">
                <h2 class="text-lg font-semibold text-pandata-charcoal">
                    <i class="fas fa-list mr-2 text-pandata-red"></i>
                    Team Members
                </h2>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Name</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Email</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Submitted</th>
                        </tr>
                    </thead>
                    <tbody id="membersTable" class="divide-y divide-gray-200">
                        <tr>
                            <td colspan="4" class="px-6 py-4 text-center text-gray-500">Loading...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Messages Section -->
        <div class="mt-8 bg-white rounded-lg shadow-md overflow-hidden">
            <div class="px-6 py-4 border-b border-pandata-gray-light bg-white">
                <h2 class="text-lg font-semibold text-pandata-charcoal">
                    <i class="fas fa-comments mr-2 text-pandata-red"></i>
                    Submitted Messages
                </h2>
            </div>
            <div id="messagesSection" class="p-6 space-y-4">
                <p class="text-pandata-gray text-center">No messages yet...</p>
            </div>
        </div>

    </div>

    <script>
        const accessCode = '{{ access_code }}';
        let eventData = null;

        async function loadData() {
            try {
                const response = await fetch(`/api/admin/${accessCode}`);
                const data = await response.json();
                
                if (data.error) {
                    alert('Error: ' + data.error);
                    return;
                }

                eventData = data;
                renderData(data);
            } catch (error) {
                console.error('Error loading data:', error);
            }
        }

        function renderData(data) {
            // Header
            document.getElementById('honoreeName').textContent = data.event.honoreeName;
            document.title = `Admin - Farewell for ${data.event.honoreeName}`;
            
            const deadline = new Date(data.event.deadline);
            document.getElementById('deadline').textContent = deadline.toLocaleDateString('en-US', {
                weekday: 'short',
                month: 'short',
                day: 'numeric'
            });

            // Stats
            document.getElementById('statTotal').textContent = data.stats.total;
            document.getElementById('statSubmitted').textContent = data.stats.submitted;
            document.getElementById('statInvited').textContent = data.stats.invited;
            document.getElementById('statNotInvited').textContent = data.stats.notInvited;

            // Disable "Send Invitations" button if no one left to invite
            const sendInvBtn = document.getElementById('sendInvitationsBtn');
            if (data.stats.notInvited === 0) {
                sendInvBtn.disabled = true;
                sendInvBtn.classList.remove('bg-pandata-red', 'hover:bg-pandata-red-dark');
                sendInvBtn.classList.add('bg-gray-300', 'cursor-not-allowed');
                sendInvBtn.title = 'All team members have been invited';
            } else {
                sendInvBtn.disabled = false;
                sendInvBtn.classList.add('bg-pandata-red', 'hover:bg-pandata-red-dark');
                sendInvBtn.classList.remove('bg-gray-300', 'cursor-not-allowed');
                sendInvBtn.title = '';
            }

            // Drive link (deprecated - kept for backwards compatibility)
            // if (data.event.googleDriveFolderUrl) {
            //     const driveLink = document.getElementById('driveLink');
            //     driveLink.href = data.event.googleDriveFolderUrl;
            //     driveLink.classList.remove('hidden');
            // }

            // Table
            const tbody = document.getElementById('membersTable');
            if (data.members.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="px-6 py-4 text-center text-gray-500">No team members added yet</td></tr>';
            } else {
                // Sort members: 1) by status (Submitted → Invited → Not Invited), 2) alphabetically by name
                const sortedMembers = [...data.members].sort((a, b) => {
                    // Get status priority: Submitted = 1, Invited = 2, Not Invited = 3
                    const getStatusPriority = (m) => {
                        if (m.hasSubmitted) return 1;
                        if (m.invitedAt) return 2;
                        return 3;
                    };
                    
                    const statusA = getStatusPriority(a);
                    const statusB = getStatusPriority(b);
                    
                    // First sort by status
                    if (statusA !== statusB) return statusA - statusB;
                    
                    // Then sort alphabetically by name
                    return a.name.localeCompare(b.name);
                });
                
                tbody.innerHTML = sortedMembers.map(member => {
                    // Determine status
                    let statusBadge;
                    let rowClass = '';
                    
                    if (member.hasSubmitted) {
                        rowClass = 'bg-green-50';
                        statusBadge = `<span class="px-2 py-1 text-xs font-medium bg-green-100 text-green-700 rounded-full"><i class="fas fa-check mr-1"></i>Submitted</span>
                                       ${member.fileUrl ? '<span class="ml-1 px-2 py-1 text-xs font-medium bg-pandata-charcoal/20 text-pandata-charcoal rounded-full"><i class="fas fa-paperclip mr-1"></i>File</span>' : ''}`;
                    } else if (member.invitedAt) {
                        rowClass = 'bg-yellow-50';
                        statusBadge = `<span class="px-2 py-1 text-xs font-medium bg-yellow-100 text-yellow-700 rounded-full"><i class="fas fa-clock mr-1"></i>Pending</span>
                                       <span class="ml-1 text-xs text-pandata-gray">(invited ${new Date(member.invitedAt).toLocaleDateString()})</span>`;
                    } else {
                        statusBadge = '<span class="px-2 py-1 text-xs font-medium bg-gray-100 text-gray-600 rounded-full"><i class="fas fa-user-clock mr-1"></i>Not invited</span>';
                    }
                    
                    return `
                    <tr class="${rowClass}">
                        <td class="px-6 py-4 whitespace-nowrap">
                            <span class="font-medium text-pandata-charcoal">${member.name}</span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-pandata-gray-dark">
                            ${member.email}
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            ${statusBadge}
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-pandata-gray text-sm">
                            ${member.submittedAt ? new Date(member.submittedAt).toLocaleDateString() : '-'}
                        </td>
                    </tr>`;
                }).join('');
            }

            // Messages
            const messagesSection = document.getElementById('messagesSection');
            const submittedMembers = data.members.filter(m => m.hasSubmitted && (m.message || m.fileUrl || (m.photoUrls && m.photoUrls.length > 0)));
            if (submittedMembers.length === 0) {
                messagesSection.innerHTML = '<p class="text-pandata-gray text-center">No messages yet...</p>';
            } else {
                messagesSection.innerHTML = submittedMembers.map(member => {
                    // Combine fileUrl (handwritten note) and photoUrls
                    const allFiles = [];
                    if (member.fileUrl) allFiles.push({ url: member.fileUrl, type: 'note' });
                    if (member.photoUrls) member.photoUrls.forEach(url => allFiles.push({ url, type: 'photo' }));
                    
                    return `
                    <div class="p-4 bg-pandata-gray-light rounded-lg border-l-4 border-pandata-red">
                        <div class="flex items-start gap-4">
                            <div class="flex-grow min-w-0">
                                <p class="text-sm font-medium text-pandata-charcoal">${member.name}</p>
                                ${member.message ? `<p class="text-pandata-gray-dark text-sm mt-1">"${member.message}"</p>` : ''}
                                ${!member.message && allFiles.length > 0 ? '<p class="text-pandata-gray text-sm italic mt-1">Files uploaded</p>' : ''}
                            </div>
                        </div>
                        ${allFiles.length > 0 ? `
                            <div class="mt-3 flex flex-wrap gap-2">
                                ${allFiles.map(file => 
                                    file.url.match(/\.(jpg|jpeg|png|gif|webp)$/i) 
                                        ? `<a href="${file.url}" target="_blank" class="relative group">
                                            <img src="${file.url}" class="w-16 h-16 object-cover rounded shadow-sm hover:opacity-80 transition-opacity">
                                            ${file.type === 'note' ? '<span class="absolute bottom-0 left-0 right-0 bg-blue-500 text-white text-[10px] text-center rounded-b">Note</span>' : ''}
                                           </a>`
                                        : `<a href="${file.url}" target="_blank" class="w-16 h-16 flex items-center justify-center bg-pandata-charcoal/10 rounded hover:bg-pandata-charcoal/20">
                                            <i class="fas fa-file-pdf text-xl text-pandata-charcoal"></i>
                                           </a>`
                                ).join('')}
                            </div>
                        ` : ''}
                    </div>`;
                }).join('');
            }

        }

        function showNotification(message, type = 'success') {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.className = `fixed top-4 right-4 px-6 py-4 rounded-lg shadow-lg z-50 ${
                type === 'success' ? 'bg-pandata-charcoal text-white' : 'bg-pandata-red text-white'
            }`;
            notification.classList.remove('hidden');
            setTimeout(() => notification.classList.add('hidden'), 3000);
        }

        async function sendInvitations() {
            if (!eventData) return;
            
            const btn = document.getElementById('sendInvitationsBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Sending...';

            try {
                const response = await fetch(`/api/events/${eventData.event.id}/send-invitations`, {
                    method: 'POST'
                });
                const result = await response.json();
                
                if (result.success) {
                    showNotification(`Sent ${result.sentCount} invitation(s)!`);
                } else {
                    showNotification(result.error || 'Error sending invitations', 'error');
                }
            } catch (error) {
                showNotification('Error: ' + error.message, 'error');
            }

            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-envelope mr-2"></i>Send Invitations';
        }

        async function sendReminders() {
            if (!eventData) return;
            
            const btn = document.getElementById('sendRemindersBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Sending...';

            try {
                const response = await fetch(`/api/events/${eventData.event.id}/send-reminders`, {
                    method: 'POST'
                });
                const result = await response.json();
                
                if (result.success) {
                    showNotification(`Sent ${result.sentCount} reminder(s) to ${result.pendingMembers} pending member(s)!`);
                } else {
                    showNotification(result.error || 'Error sending reminders', 'error');
                }
            } catch (error) {
                showNotification('Error: ' + error.message, 'error');
            }

            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-bell mr-2"></i>Remind All Pending';
        }

        function openAddMemberModal() {
            document.getElementById('addMemberModal').classList.remove('hidden');
            document.getElementById('newMemberEmail').value = '';
            document.getElementById('newMemberName').value = '';
            document.getElementById('sendInviteImmediately').checked = true;
            document.getElementById('newMemberEmail').focus();
        }

        function closeAddMemberModal() {
            document.getElementById('addMemberModal').classList.add('hidden');
        }

        async function addMember() {
            const email = document.getElementById('newMemberEmail').value.trim();
            const name = document.getElementById('newMemberName').value.trim();
            const sendInvite = document.getElementById('sendInviteImmediately').checked;

            if (!email) {
                showNotification('Please enter an email address', 'error');
                return;
            }

            const btn = document.getElementById('addMemberSubmitBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Adding...';

            try {
                const response = await fetch(`/api/admin/${accessCode}/add-member`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, name, sendInvite })
                });
                const result = await response.json();

                if (result.success) {
                    closeAddMemberModal();
                    if (result.inviteSent) {
                        showNotification(`Added ${result.memberName} and sent invitation!`);
                    } else {
                        showNotification(`Added ${result.memberName} to the list`);
                    }
                    loadData(); // Refresh the table
                } else {
                    showNotification(result.error || 'Error adding member', 'error');
                }
            } catch (error) {
                showNotification('Error: ' + error.message, 'error');
            }

            btn.disabled = false;
            btn.innerHTML = 'Add Member';
        }

        function downloadAll() {
            if (!eventData || eventData.stats.submitted === 0) {
                showNotification('No submissions to download yet', 'error');
                return;
            }
            
            const btn = document.getElementById('downloadAllBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Preparing...';
            
            // Trigger download
            window.location.href = `/api/admin/${accessCode}/download-all`;
            
            // Reset button after a delay
            setTimeout(() => {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-download mr-2"></i>Download ZIP';
            }, 2000);
        }

        async function checkMiroStatus() {
            try {
                const response = await fetch('/api/miro/status');
                const data = await response.json();
                
                if (data.configured) {
                    document.getElementById('miroSection').classList.remove('hidden');
                }
            } catch (error) {
                console.error('Error checking Miro status:', error);
            }
        }

        async function createMiroCollage() {
            if (!eventData || eventData.stats.submitted === 0) {
                showNotification('No submissions yet. Wait for some messages before creating a collage!', 'error');
                return;
            }
            
            const btn = document.getElementById('createMiroBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Creating Collage...';

            try {
                const response = await fetch(`/api/admin/${accessCode}/create-miro-collage`, {
                    method: 'POST'
                });
                const result = await response.json();
                
                if (result.success) {
                    showNotification(`Miro collage created with ${result.itemCount} submission(s)!`);
                    
                    // Show link to the board
                    const miroLink = document.getElementById('miroLink');
                    miroLink.href = result.boardUrl;
                    miroLink.classList.remove('hidden');
                    
                    // Open in new tab
                    window.open(result.boardUrl, '_blank');
                } else {
                    showNotification(result.error || 'Error creating Miro collage', 'error');
                }
            } catch (error) {
                showNotification('Error: ' + error.message, 'error');
            }

            btn.disabled = false;
